<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stack Builder - Neon Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050508;
    --surface: #0f0f1a;
    --accent: #00f2ff; /* Neon Cyan */
    --text: #f0f0f8;
    --muted: #4a4a6a;
    --danger: #ff4f6e;
    --glow: rgba(0, 242, 255, 0.4);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Space Mono', monospace;
    color: var(--text);
    touch-action: none;
    user-select: none;
  }

  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    /* Deep space gradient */
    background: radial-gradient(circle at 50% 50%, #0d0d1a 0%, #050508 100%);
  }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px 28px 0;
    pointer-events: none;
  }

  #score-label {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(56px, 12vw, 96px);
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 20px var(--glow);
    letter-spacing: 2px;
  }

  #best-label {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }
  #best-label span { color: var(--accent); font-size: 20px; display: block; }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* ── OVERLAY SCREENS ── */
  .screen {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5, 5, 8, 0.85);
    backdrop-filter: blur(15px);
    gap: 20px;
    transition: opacity .4s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  .screen-title {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(52px, 14vw, 110px);
    color: var(--accent);
    letter-spacing: 4px;
    text-shadow: 0 0 40px var(--glow);
    line-height: 1;
    text-align: center;
  }

  .screen-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: .12em;
    text-transform: uppercase;
    text-align: center;
    line-height: 2;
    max-width: 280px;
  }

  .btn {
    margin-top: 10px;
    padding: 14px 42px;
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    transition: all .2s;
    box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
  }
  .btn:hover { 
    background: var(--accent); 
    color: #050508; 
    box-shadow: 0 0 30px var(--glow);
    transform: translateY(-2px);
  }

  #gameover-score {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(28px, 6vw, 44px);
    color: var(--text);
    letter-spacing: 2px;
  }

  #speed-badge {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-size: 10px;
    letter-spacing: .15em;
    color: var(--accent);
    text-transform: uppercase;
    pointer-events: none;
    opacity: 0;
    transition: opacity .5s;
  }
  #speed-badge.show { opacity: 1; }

  #perfect-flash {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Bebas Neue', cursive;
    font-size: 48px;
    color: #fff;
    letter-spacing: 6px;
    pointer-events: none;
    z-index: 300;
    opacity: 0;
    text-shadow: 0 0 30px #fff, 0 0 60px var(--accent);
  }
  @keyframes perfectPop {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(.6); }
    30%  { opacity:1; transform:translate(-50%,-55%) scale(1.1); }
    70%  { opacity:1; transform:translate(-50%,-60%) scale(1); }
    100% { opacity:0; transform:translate(-50%,-70%) scale(.9); }
  }
  #perfect-flash.pop { animation: perfectPop .9s ease forwards; }

  /* Grid overlay with more depth */
  #app::before {
    content:'';
    position:fixed;inset:0;
    background-image: 
      linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events:none;
    mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
  }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div id="score-label">0</div>
    <div id="best-label">BEST<span id="best-val">0</span></div>
  </div>
  <canvas id="canvas"></canvas>
  <div id="perfect-flash">PERFECT</div>
  <div id="speed-badge">⚡ OVERDRIVE</div>

  <div class="screen" id="start-screen">
    <div class="screen-title">NEON<br>STACKER</div>
    <div class="screen-sub">Align the pulse blocks.<br>Reach the stars.</div>
    <button class="btn" id="start-btn">INITIALIZE</button>
  </div>

  <div class="screen hidden" id="gameover-screen">
    <div class="screen-title">CRITICAL<br>FAILURE</div>
    <div id="gameover-score">STABILITY — 0</div>
    <div class="screen-sub">Tower structural integrity lost.</div>
    <button class="btn" id="restart-btn">REBOOT SYSTEM</button>
  </div>
</div>

<script>
(() => {
  const BLOCK_H       = 32;       
  const BASE_SPEED    = 3.0;      
  const SPEED_STEP    = 0.25;     
  const PERFECT_TOL   = 5;        
  const CAMERA_EASE   = 0.07;     
  const GROUND_BLOCKS = 5;        
  const BG_COLOR      = '#050508';

  let blocks = [], moving = null;
  let score = 0, best = 0;
  let hue = 190;
  let cameraY = 0, targetCameraY = 0;
  let gameRunning = false;
  let animId = null;
  let speedBadgeTimer = null;
  
  // Stars for background
  let stars = [];

  const canvas       = document.getElementById('canvas');
  const ctx          = canvas.getContext('2d');
  const scoreEl      = document.getElementById('score-label');
  const bestEl       = document.getElementById('best-val');
  const startScreen  = document.getElementById('start-screen');
  const goScreen     = document.getElementById('gameover-screen');
  const goScore      = document.getElementById('gameover-score');
  const startBtn     = document.getElementById('start-btn');
  const restartBtn   = document.getElementById('restart-btn');
  const perfectEl    = document.getElementById('perfect-flash');
  const speedBadge   = document.getElementById('speed-badge');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    initStars();
  }

  function initStars() {
    stars = [];
    for(let i=0; i<100; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        s: Math.random() * 2,
        o: Math.random()
      });
    }
  }

  window.addEventListener('resize', resize);
  resize();

  function blockGradient(h, x, y, w, ht, isMoving) {
    const g = ctx.createLinearGradient(x, y, x, y + ht);
    // Neon glass look
    const alpha = isMoving ? 0.9 : 0.7;
    g.addColorStop(0, `hsla(${h}, 90%, 70%, ${alpha})`);
    g.addColorStop(0.5, `hsla(${h}, 90%, 50%, ${alpha})`);
    g.addColorStop(1, `hsla(${h}, 90%, 30%, ${alpha})`);
    return g;
  }

  function getSpeed() {
    return BASE_SPEED + Math.floor(score / 5) * SPEED_STEP;
  }

  function spawnMoving() {
    const last = blocks[blocks.length - 1];
    const dir  = (Math.random() < 0.5) ? 1 : -1;
    const startX = dir === 1 ? -last.w - 50 : canvas.width + 50;
    hue = (hue + 15) % 360;
    moving = {
      x: startX,
      w: last.w,
      y: last.y - BLOCK_H,
      dir,
      color: hue
    };
  }

  function initGame() {
    blocks = [];
    score  = 0;
    hue    = 190;
    const bw = Math.min(canvas.width * 0.5, 220);
    const cx = canvas.width / 2 - bw / 2;
    
    for (let i = 0; i < GROUND_BLOCKS; i++) {
      blocks.push({ x: cx, w: bw, y: -i * BLOCK_H, color: hue });
    }

    const topBlock = blocks[blocks.length - 1];
    targetCameraY = topBlock.y - canvas.height * 0.7;
    cameraY = targetCameraY;
    scoreEl.textContent = '0';
    spawnMoving();
  }

  function placeBlock() {
    if (!moving || !gameRunning) return;
    const last  = blocks[blocks.length - 1];
    const overlapStart = Math.max(moving.x, last.x);
    const overlapEnd   = Math.min(moving.x + moving.w, last.x + last.w);
    const overlap      = overlapEnd - overlapStart;

    if (overlap <= 0) {
      endGame();
      return;
    }

    const diff = Math.abs(moving.x - last.x);
    if (diff <= PERFECT_TOL) {
      moving.x = last.x;
      moving.w = last.w;
      triggerPerfect();
    } else {
      moving.w = overlap;
      moving.x = overlapStart;
    }

    blocks.push({ x: moving.x, w: moving.w, y: moving.y, color: moving.color });
    score++;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
    if (score % 5 === 0) showSpeedBadge();
    targetCameraY = blocks[blocks.length - 1].y - canvas.height * 0.65;
    spawnMoving();
  }

  function triggerPerfect() {
    perfectEl.classList.remove('pop');
    void perfectEl.offsetWidth; 
    perfectEl.classList.add('pop');
  }

  function showSpeedBadge() {
    speedBadge.classList.add('show');
    clearTimeout(speedBadgeTimer);
    speedBadgeTimer = setTimeout(() => speedBadge.classList.remove('show'), 1500);
  }

  function endGame() {
    gameRunning = false;
    goScore.textContent = `STABILITY — ${score}`;
    goScreen.classList.remove('hidden');
  }

  function drawBlock(b, isMoving = false) {
    const screenY = b.y - cameraY;
    
    // Glow effect
    ctx.shadowBlur = 15;
    ctx.shadowColor = `hsla(${b.color}, 100%, 50%, 0.5)`;
    
    // Main Block Body
    ctx.fillStyle = blockGradient(b.color, b.x, screenY, b.w, BLOCK_H, isMoving);
    ctx.beginPath();
    ctx.roundRect(b.x, screenY, b.w, BLOCK_H - 2, 2); // Small gap between blocks
    ctx.fill();
    
    // Reset shadow for performance
    ctx.shadowBlur = 0;

    // Bevel/Neon Edge
    ctx.strokeStyle = `hsla(${b.color}, 100%, 80%, 0.8)`;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Top Shine (Glass Effect)
    ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
    ctx.fillRect(b.x + 2, screenY + 2, b.w - 4, 4);
  }

  function drawBackground() {
    ctx.fillStyle = BG_COLOR;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Draw Parallax Stars
    ctx.fillStyle = "#fff";
    stars.forEach(s => {
      // Modulo arithmetic to keep stars looping vertically
      let py = (s.y - cameraY * 0.2) % canvas.height;
      if (py < 0) py += canvas.height;
      ctx.globalAlpha = s.o;
      ctx.beginPath();
      ctx.arc(s.x, py, s.s, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function loop() {
    drawBackground();
    cameraY += (targetCameraY - cameraY) * CAMERA_EASE;

    if (moving && gameRunning) {
      const speed = getSpeed();
      moving.x += moving.dir * speed;
      if (moving.x > canvas.width + 20)  moving.dir = -1;
      if (moving.x + moving.w < -20)     moving.dir =  1;
    }

    blocks.forEach(b => {
      const screenY = b.y - cameraY;
      if (screenY > canvas.height + 100 || screenY < -100) return;
      drawBlock(b);
    });

    if (moving) drawBlock(moving, true);

    animId = requestAnimationFrame(loop);
  }

  function handleAction() {
    if (gameRunning) placeBlock();
  }

  window.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); handleAction(); }
  });
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    handleAction();
  });

  function startGame() {
    startScreen.classList.add('hidden');
    goScreen.classList.add('hidden');
    initGame();
    gameRunning = true;
    if (animId) cancelAnimationFrame(animId);
    loop();
  }

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  window.addEventListener('keydown', e => {
    if (e.code === 'Space' && !gameRunning) {
      e.preventDefault();
      startGame();
    }
  });

  loop();
})();
</script>
</body>
</html>
